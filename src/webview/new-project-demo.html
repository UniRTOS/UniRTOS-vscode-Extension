<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Project Demo</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial; padding: 20px; color: #222 }
    /* Header styles moved to src/webview/header.html for reuse */
    h1 { color: #0066cc }
    button { padding:8px 12px; margin-top:10px }
  </style>
</head>
<body>
  <div id="header-root"></div>
  <h1>New Project — Demo</h1>
  <p>This is a demo webview for creating a new project. Replace with your actual UI.</p>
  <button id="create">Create Demo Project</button>
  <script>
    document.getElementById('create').addEventListener('click', () => {
      // Post a message to the extension host if needed
      if (window && window.acquireVsCodeApi) {
        const api = acquireVsCodeApi();
        api.postMessage({ type: 'createDemo', payload: { name: 'demo-project' } });
      }
      alert('Create demo project clicked (demo only).');
    });
  </script>
</body>
</html>
