<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New Project Demo</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial; padding: 12px; }
    .row { margin-bottom: 8px; }
    label { display:block; font-weight:600; margin-bottom:4px }
    select, button { width:80%; padding:8px; }
    .actions { display:flex; gap:8px; margin-top:12px }
    .actions button { flex:1 }
    /* Header styles moved to src/webview/header.html for reuse */
    h1 { color: #0066cc }
  </style>
</head>
<body>
  <div id="header-root"></div>
  <h1>New Project — Demo</h1>
  <div class="row">
    <label for="projectName">Project name</label>
    <input id="projectName" type="text" placeholder="Enter project name" style="flex:1; padding:8px" />
  </div>

  <div class="row">
    <label for="platform">Platform</label>
    <select id="platform"></select>
  </div>
  <div class="row">
    <label for="model">Model (optional)</label>
    <select id="model"><option value="">— none —</option></select>
  </div>
  
  <label for="demo-projects">Choose demo project:</label>
  <select id="demo-projects" aria-label="Demo projects">
    <!-- options will be injected by the extension -->
  </select>

  <div class="row">
    <label for="targetDir">Save location (where SDK will be cloned)</label>
    <div style="width:80%; gap:8px;">
      <input id="targetDir" type="text" readonly style="flex:1; padding:8px" placeholder="Select folder..." />
      <button id="choose-dir" style="width:120px">Choose...</button>
    </div>
  </div>
  <div class="row">
    <label for="sdkVersion">SDK version</label>
    <select id="sdkVersion" style="width:80%; padding:8px">
      <option value="v1.0" selected>v1.0</option>
      <option value="v1.1" hidden>v1.1</option>
      <option value="v2.0" hidden>v2.0</option>
    </select>
  </div>
  <div class="actions" style="width:80%;">
    <button id="create">Create Demo Project</button>
  </div>

  <!--PROJECTS_SCRIPT-->
  <script>
    (function() {
      const vscode = acquireVsCodeApi();
      const select = document.getElementById('demo-projects');

      // notify extension this demo webview is ready to receive platforms/models
      vscode.postMessage({ type: 'ready' });

    document.getElementById('platform').addEventListener('change', (e) => {
      vscode.postMessage({ type: 'platformChanged', value: e.target.value });
    });

      document.getElementById('create').addEventListener('click', () => {
        const selected = select ? select.value : null;
        if (window && window.acquireVsCodeApi) {
          const api = acquireVsCodeApi();
          api.postMessage({ type: 'createDemo', payload: { name: selected || 'demo-project' } });
        }
      });

      // accept messages from extension to populate UI
      window.addEventListener('message', event => {
        const msg = event.data;
        if (msg.type === 'setPlatforms') {
          const platformSel = document.getElementById('platform');
          platformSel.innerHTML = '';
          msg.platforms.forEach(p => {
            const opt = document.createElement('option'); opt.value = p; opt.textContent = p; platformSel.appendChild(opt);
          });
          platformSel.dispatchEvent(new Event('change'));
        }

        if (msg.type === 'setModels') {
          const modelSel = document.getElementById('model');
          if (modelSel) {
            modelSel.innerHTML = '<option value="">— none —</option>';
            (msg.models || []).forEach(m => {
              const opt = document.createElement('option'); opt.value = m; opt.textContent = m; modelSel.appendChild(opt);
            });
          }
        }
      });

      // If the extension injected `window.__demoProjects` before script ran, populate now
      try {
        const projects = window.__demoProjects || [];
        if (select && Array.isArray(projects)) {
          projects.forEach(p => {
            const opt = document.createElement('option');
            opt.value = p.id || p.name || p;
            opt.textContent = p.name || p;
            select.appendChild(opt);
          });
        }
      } catch (e) {
        // ignore
      }

    })();
  </script>
</body>
</html>
