<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; img-src https: data:; script-src 'unsafe-inline' vscode-resource:; style-src 'unsafe-inline' vscode-resource:;">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>New UniRTOS Project</title>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial; padding: 12px; }
    .row { margin-bottom: 8px; }
    label { display:block; font-weight:600; margin-bottom:4px }
    select, button { width:100%; padding:8px; }
    .actions { display:flex; gap:8px; margin-top:12px }
    .actions button { flex:1 }
  </style>
</head>
<body>
  <div id="header-root"></div>
  <h2>New UniRTOS Project</h2>
  <div class="row">
    <label for="platform">Platform</label>
    <select id="platform"></select>
  </div>
  <div class="row">
    <label for="model">Model (optional)</label>
    <select id="model"><option value="">— none —</option></select>
  </div>
  <div class="row">
    <label for="targetDir">Save location (where SDK will be cloned)</label>
    <div style="display:flex; gap:8px;">
      <input id="targetDir" type="text" readonly style="flex:1; padding:8px" placeholder="Select folder..." />
      <button id="choose-dir" style="width:120px">Choose...</button>
      <button id="open-demo" style="width:120px">Demo projects</button>
    </div>
  </div>
  <div class="actions">
    <button id="cancel">Cancel</button>
    <button id="create">Continue</button>
  </div>

  <script>
    const vscode = acquireVsCodeApi();

    // request platforms data from extension
    vscode.postMessage({ type: 'ready' });

    document.getElementById('platform').addEventListener('change', (e) => {
      vscode.postMessage({ type: 'platformChanged', value: e.target.value });
    });

    document.getElementById('cancel').addEventListener('click', () => {
      vscode.postMessage({ type: 'cancel' });
    });

    document.getElementById('open-demo').addEventListener('click', () => {
      vscode.postMessage({ type: 'openDemo' });
    });

    document.getElementById('choose-dir').addEventListener('click', () => {
      vscode.postMessage({ type: 'chooseDir' });
    });

    document.getElementById('create').addEventListener('click', () => {
      const platform = document.getElementById('platform').value;
      const model = document.getElementById('model').value;
      const targetDir = document.getElementById('targetDir').value;

      const missing = [];
      if (!platform) missing.push('platform');
      if (!model) missing.push('model');
      if (!targetDir) missing.push('save location');

      if (missing.length > 0) {
        vscode.postMessage({ type: 'showMessage', level: 'warning', text: `Please select: ${missing.join(', ')}` });
        return;
      }

      vscode.postMessage({ type: 'create', platform: platform, model: model, targetDir: targetDir });
    });

    // accept messages from extension to populate UI
    window.addEventListener('message', event => {
      const msg = event.data;
      if (msg.type === 'setPlatforms') {
        const platformSel = document.getElementById('platform');
        platformSel.innerHTML = '';
        msg.platforms.forEach(p => {
          const opt = document.createElement('option'); opt.value = p; opt.textContent = p; platformSel.appendChild(opt);
        });
        // trigger change to populate models
        platformSel.dispatchEvent(new Event('change'));
      }
      if (msg.type === 'setModels') {
        const modelSel = document.getElementById('model');
        modelSel.innerHTML = '<option value="">— none —</option>';
        msg.models.forEach(m => {
          const opt = document.createElement('option'); opt.value = m; opt.textContent = m; modelSel.appendChild(opt);
        });
      }
      if (msg.type === 'setTargetDir') {
        const input = document.getElementById('targetDir');
        if (input) input.value = msg.path || '';
      }
    });
  </script>
</body>
</html>
